      </p>

      <p class="kicker">기타 소개</p>
      <ul class="etc-list">
        <li>
          <span class="ico">@</span>
          <span>
            <span class="label">아이디</span>
            <a class="value" href="https://instagram.com/jza.d" target="_blank" rel="noopener noreferrer">@jza.d</a>

        <li>
          <span class="ico">◎</span>

        </li>
        <li>
          <span class="ico">✉</span>
          <span>
            <span class="label">이메일</span>
            <a class="value" href="mailto:jzadu0@gmail.com">jzadu0@gmail.com</a>

      <div class="chips">
        <span class="chip">UX Design</span>
        <span class="chip">UI Design</span>
        <span class="chip">HCI</span>
